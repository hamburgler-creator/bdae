  let frameName=arr[Math.floor(b.t*fps)%arr.length];
  let f=BOSS_GAME_FRAMES[frameName];
  let box=BOSS_GAME_DRAW[b.type]||{w:310,h:260};
  let bob=(stateName==='idle'||stateName==='move')?Math.sin(b.t*5.5)*3:0;
  if(b.attackPose>0){ctx.save();let p=clamp(b.attackPose/.44,0,1);ctx.globalAlpha=.16+.16*p;ctx.strokeStyle='#ffd76b';ctx.lineWidth=3;ctx.beginPath();ctx.ellipse(b.x+b.w/2,b.y+b.h-78,box.w*.25+p*5,box.h*.18+p*4,0,0,Math.PI*2);ctx.stroke();ctx.restore();}
  if(f){let sx=f[0],sy=f[1],sw=f[2],sh=f[3],dw=box.w,dh=box.h;ctx.save();ctx.translate(b.x+b.w/2,b.y+b.h+bob);if(b.dir<0)ctx.scale(-1,1);ctx.drawImage(images.bossGameReady,sx,sy,sw,sh,-dw/2,-dh,dw,dh);ctx.restore();}
  if(b.stun>0||b.hurt>0){ctx.save();ctx.globalAlpha=.34+Math.sin(performance.now()/90)*.11;ctx.strokeStyle=b.stun>0?'#77ff9e':'#fff';ctx.lineWidth=3;ctx.beginPath();ctx.ellipse(b.x+b.w/2,b.y+b.h-78,box.w*.24,box.h*.18,0,0,Math.PI*2);ctx.stroke();ctx.restore();}
  ctx.fillStyle='rgba(0,0,0,.45)';rr(390,18,500,26,12,true,false);ctx.fillStyle='#ff6382';rr(396,24,488*(b.hp/b.max),14,8,true,false);ctx.fillStyle='#fff';ctx.font='bold 18px Trebuchet MS';ctx.fillText(b.type,404,37)
}
function drawShots(){for(const s of shots)drawEnemySprite('star',s.x-camera+s.w/2,s.y+s.h/2,32,26);for(const s of eshots){if(s.warn&&s.warn>0){ctx.globalAlpha=.35;ctx.fillStyle='#ff5bd6';rr(s.x-camera,s.y,s.w,s.h,8,true,false);ctx.globalAlpha=1;continue}let n=s.type==='micwave'||s.type==='grandwave'?'wave_purple':s.type==='cake'?'cake_projectile':s.type==='crumb'?'crumb_boulder':s.type==='djwave'?'sound_blue':s.type==='beat'?'beat_drop':s.type==='root'?'root_branch':s.type==='orb'?'grand_orb':'leaf_storm';drawBossSprite(n,s.x-camera+s.w/2,s.y+s.h/2,s.w*1.6,s.h*1.6,(s.vx||0)<0,'center')}}
function draw(){ctx.clearRect(0,0,W,H);if(state==='title'||state==='story'||state==='win'){let im=images[state==='win'?'end':'title'];if(im)ctx.drawImage(im,0,0,W,H);ctx.fillStyle='#0005';ctx.fillRect(0,0,W,H);return}if(!world)return;drawBg();world.plats.forEach(drawPlat);drawWorldObjects();drawItems();for(const e of world.enemies||[])if(e.alive)drawEnemySprite(e.type,e.x-camera+e.w/2,e.y+e.h,e.w*1.4,e.h*1.4,e.dir<0);if(world.boss)drawBoss();drawShots();drawFerret();if(world.hint){ctx.fillStyle='rgba(0,0,0,.48)';rr(20,672,1240,34,14,true,false);ctx.fillStyle='#fff';ctx.font='bold 16px Trebuchet MS';ctx.fillText('Puzzle: '+world.hint,36,695)}}
function drawHUD(){if(!world)return;let active=Object.keys(P.powers).map(k=>POWER_INFO[k][0]+(P.powers[k]>0?' '+Math.ceil(P.powers[k])+'s':' until hit'));hl.innerHTML='<span class="chip">HP: '+('❤'.repeat(Math.max(0,P.hp)))+'</span><span class="chip">Lives: '+P.lives+'</span><span class="chip">Shield: '+P.shieldHits+'/5</span><span class="chip">Coins: '+P.coins+'</span><span class="chip">Score: '+P.score+'</span>';hr.innerHTML='<span class="chip">'+(state==='boss'?'Boss Arena':'Level '+(level+1))+'</span><span class="chip">Power: '+(active.join(' + ')||'Sparkle Shot')+'</span>'}
function loop(t){let dt=Math.min(.033,(t-last)/1000||.016);last=t;update(dt);draw();drawHUD();requestAnimationFrame(loop)}
loadImgs().then(()=>{showTitle();requestAnimationFrame(loop)});
</script></body></html>
